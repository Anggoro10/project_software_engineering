<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Wise Responsive</title>
    <style>
        /* Dasar Halaman */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Container dengan Background Gradient */
        .main-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #101835 0%, #202d5a 40%, #7c88a8 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Section Logo & Teks - Responsive Flex */
        .logo-section {
            display: flex;
            flex-direction: row; /* Default: menyamping */
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
            width: 100%;
        }

        .brand-text {
            font-size: clamp(24px, 5vw, 40px); /* Ukuran font fleksibel */
            font-weight: 800;
            letter-spacing: 4px;
            color: #121b33;
            text-transform: uppercase;
        }

        .center-logo {
            width: clamp(120px, 30vw, 200px); /* Ukuran logo fleksibel */
            height: auto;
            filter: drop-shadow(0px 10px 20px rgba(0, 0, 0, 0.4));
        }

        /* Tombol START */
        .start-button {
            background-color: #ffffff;
            color: #101835;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            padding: 15px 15%; /* Padding lebar relatif */
            min-width: 200px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
        }

        .start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0px 15px 20px rgba(0, 0, 0, 0.3);
            background-color: #f8f9fa;
        }

        /* --- RESPONSIVE BREAKPOINT (HP) --- */
        @media (max-width: 600px) {
            .logo-section {
                flex-direction: column; /* Teks & Logo jadi tumpuk di HP */
                gap: 10px;
            }

            .brand-text {
                letter-spacing: 8px;
            }

            .start-button {
                width: 80%; /* Tombol lebih lebar di layar kecil */
                padding: 12px 0;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="logo-section">
            <span class="brand-text">FUEL</span>
            
            <img src="./Tambahkan sedikit teks isi (9) 1.png" alt="Fuel Wise Logo" class="center-logo">
            
            <span class="brand-text">WISE</span>
        </div>

        <button class="start-button">START</button>

    </div>

</body>
</html>
