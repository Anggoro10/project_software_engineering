<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Trip Info</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="top-icon">
            <div class="circle-white">
                <img src="https://img.icons8.com/ios-filled/50/000000/car.png" alt="car">
            </div>
        </div>

        <h1 class="title">Your trip</h1>

        <div class="fuel-summary-card">
            <div class="fuel-row">
                <div class="fuel-item">
                    <p class="label color-blue">Fuel Used</p>
                    <p class="value color-red">7.09 <span class="unit color-blue">Liter</span></p>
                </div>
                <div class="fuel-item text-right">
                    <p class="label color-blue">Fuel Price</p>
                    <p class="value color-red"><span class="unit color-blue">Rp</span> 86.100</p>
                </div>
            </div>
        </div>

        <div class="bento-grid">
            
            <div class="card tall">
                <p class="card-label">Car Type</p>
                <div class="card-content">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Toyota_car_logo.svg" alt="toyota" class="brand-logo">
                    <p class="brand-name color-blue">Toyota</p>
                    <img src="https://img.icons8.com/ios-filled/50/000000/car.png" alt="model" class="car-icon">
                    <p class="model-name color-blue">Camry</p>
                </div>
            </div>

            <div class="card small">
                <p class="card-label">Engine</p>
                <div class="card-content">
                    <img src="https://img.icons8.com/ios-filled/50/000000/engine.png" alt="engine" class="icon-small">
                    <p class="value-text color-blue">2500 cc</p>
                </div>
            </div>

            <div class="card small">
                <p class="card-label">Fuel Type</p>
                <div class="card-content centered">
                    <p class="value-text color-blue">RON 92</p>
                </div>
            </div>

            <div class="card small">
                <p class="card-label">Destination</p>
                <div class="card-content row">
                    <img src="https://img.icons8.com/ios-filled/50/000000/marker.png" alt="loc" class="icon-small">
                    <p class="value-text color-blue text-left">Bekasi summa...</p>
                </div>
            </div>

            <div class="card small">
                <p class="card-label">Fuel Brand</p>
                <div class="card-content">
                    <img src="https://upload.wikimedia.org/wikipedia/en/e/e8/Shell_logo.svg" alt="shell" class="icon-brand">
                    <p class="value-text color-blue font-black">SHELL</p>
                </div>
            </div>

             <div class="card small">
                <p class="card-label">Distance</p>
                <div class="card-content">
                    <img src="https://img.icons8.com/ios-filled/50/000000/road.png" alt="road" class="icon-small">
                    <p class="value-text color-blue">24 KM</p>
                </div>
            </div>

            <div class="card small">
                <p class="card-label">Fuel Consumption</p>
                <div class="card-content">
                    <img src="https://img.icons8.com/ios-filled/50/000000/gas-station.png" alt="fuel" class="icon-small">
                    <p class="value-text color-blue">10 KM/L</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
