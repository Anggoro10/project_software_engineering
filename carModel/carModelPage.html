<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Model Selector</title>
    <!-- Menghubungkan ke file CSS eksternal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-screen">
        <div class="header-content">
            <h1>Welcome Friend !</h1>
            <p>Your journey almost begin!</p>
        </div>

        <div class="logo-area">
            <div class="white-circle">
                <img src="assets/Toyota Logo.png" alt="Toyota Logo">
            </div>
            <p class="instruction-text">Select your car Model</p>
        </div>

        <div class="selection-panel">
            <button class="model-btn">Corolla</button>
            <button class="model-btn">Camry</button>
            <button class="model-btn">4Runner 4WD</button>
            <button class="model-btn">Camry Hybrid LE</button>
            <button class="model-btn">Corolla Hatchback</button>
            <button class="model-btn">RAV4 AWD</button>
            <button class="model-btn">4Runner 4WD (Part-Time 4WD)</button>
            <button class="model-btn">RAV4 Hybrid AWD</button>
            <button class="model-btn">Prius</button>
            <button class="model-btn">86</button>
            <button class="model-btn">RAV4</button>
            <button class="model-btn">Yaris Hatchback</button>
            <button class="model-btn">Yaris</button>
            <button class="model-btn">Avalon</button>
            <button class="model-btn">GR Supra 3.0</button>
            <button class="model-btn">Prius AWD</button>
            <button class="model-btn">GR86</button>
            <button class="model-btn">Camry Hybrid XLE/SE</button>
            <button class="model-btn">Prius c</button>
            <button class="model-btn">C-HR</button>
            <!-- Daftar berlanjut hingga 50 model... -->
        </div>
    </div>
</body>
</html>
