<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Car Brand</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1>Welcome Friend !</h1>
            <p>Let's start your journey</p>
        </div>

        <div class="main-icon-circle">
            <img src="https://cdn-icons-png.flaticon.com/512/741/741407.png" alt="car icon">
        </div>
        <div class="instruction">Select your car brand</div>

        <div class="brand-grid">
            <div class="brand-card">
                <img src="https://www.pngall.com/wp-content/uploads/2/Toyota-Logo-PNG-Free-Image.png" alt="Toyota">
                <span>Toyota</span>
            </div>

            <div class="brand-card">
                <img src="https://www.pngall.com/wp-content/uploads/2/Honda-Logo-PNG-Image.png" alt="Honda">
                <span>Honda</span>
            </div>

            <div class="brand-card">
                <img src="https://www.pngall.com/wp-content/uploads/2/Mercedes-Benz-Logo-PNG-HD-Image.png" alt="Mercedes">
                <span>Mercedes-Benzes</span>
            </div>

            <div class="brand-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Kia_logo.svg/2560px-Kia_logo.svg.png" alt="KIA">
                <span>KIA</span>
            </div>

            <div class="brand-card">
                <img src="https://www.pngall.com/wp-content/uploads/2/BMW-Logo-PNG-Free-Download.png" alt="BMW">
                <span>BMW</span>
            </div>

            <div class="brand-card">
                <img src="https://www.pngall.com/wp-content/uploads/2/Nissan-Logo-PNG-Clipart.png" alt="NISSAN">
                <span>NISSAN</span>
            </div>
        </div>
    </div>

</body>
</html>
